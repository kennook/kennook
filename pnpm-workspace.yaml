# pnpm v10+ canonical settings file.

# Workspace packages. Root is the kennook-app (Next.js library viewer).
# `marketing/` is the public kennook.com Next.js site (deployed via OpenNext
# + CDK). `infra/` is the CDK TypeScript app that provisions both.
packages:
  - .
  - marketing
  - infra


# Approve native-binding install/postinstall scripts for legitimate deps.
allowBuilds:
  # tfjs-node's postinstall downloads the platform-native libtensorflow
  # shared lib used for face-recognition inference.
  '@tensorflow/tfjs-node': true
  # core-js postinstall is a donation banner — harmless, declined.
  core-js: false
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
