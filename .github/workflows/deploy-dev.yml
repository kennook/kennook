name: Deploy — dev

# Pushes to `develop` deploy to the kennook.dev AWS account.
# Single-developer flow — no PR review gate; the branch IS the gate.
on:
  push:
    branches: [develop]
  workflow_dispatch: {}

# OIDC requires id-token: write. contents: read is the minimum to checkout.
permissions:
  id-token: write
  contents: read

# Cancel an in-flight dev deploy if a newer commit lands on develop.
# Prod has the opposite policy (don't cancel — see deploy-prod.yml).
concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://kennook.dev
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::719146259408:role/KenNookGithubDeploy-Dev
          aws-region: us-west-2

      - name: Build marketing site (npm-install layout for OpenNext)
        run: pnpm --filter @kennook/marketing build:all

      - name: cdk deploy dev stacks
        working-directory: infra
        run: pnpm exec cdk deploy 'KenNook*-Dev' --require-approval never
