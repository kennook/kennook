name: Deploy — prod

# Pushes to `main` deploy to the kennook.com AWS account.
# Even though you're the sole dev, the `production` GitHub environment can
# carry required reviewers / wait timers / environment secrets in the future
# without changing this workflow.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

# Do NOT cancel in-flight prod deploys — let the running one finish so
# CloudFormation doesn't get left in a half-state.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://kennook.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::045064752951:role/KenNookGithubDeploy-Prod
          aws-region: us-west-2

      - name: Build marketing site (npm-install layout for OpenNext)
        # The build generates public/version.json from the root package.json
        # version (→ kennook.com/version.json, polled by self-hosted servers to
        # detect updates). Optional release notes / link come from `production`
        # GitHub-environment variables; unset → omitted from the manifest.
        run: pnpm --filter @kennook/marketing build:all
        env:
          KENNOOK_RELEASE_NOTES: ${{ vars.KENNOOK_RELEASE_NOTES }}
          KENNOOK_RELEASE_URL: ${{ vars.KENNOOK_RELEASE_URL }}

      # `--require-approval broadening` makes CDK pause if an IAM change
      # would broaden permissions — extra safety on prod. CI can't answer
      # the prompt, so the deploy fails if that fires; you re-run after
      # reviewing. Trades automation for a tiny safety net on the highest-
      # risk category of change.
      - name: cdk deploy prod stacks
        working-directory: infra
        run: pnpm exec cdk deploy 'KenNook*-Prod' --require-approval broadening
